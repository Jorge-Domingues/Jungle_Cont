<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Livro Razão — Jungle Cont</title>
    <meta name="description" content="Livro Razão contábil por conta com saldo progressivo">
    <link rel="stylesheet" href="/css/razao.css">
    <link rel="stylesheet" href="/css/icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div id="sidebar-container"></div>
    <script src="/js/sidebar.js"></script>

    <main class="main">
        <div class="top">
            <h1><i class="fa-solid fa-chart-column"></i> Livro Razão</h1>
            <p class="subtitle">Extrato detalhado por conta contábil</p>
        </div>

        <div class="filtro-bar">
            <div>
                <label>CONTA</label>
                <select id="selectConta">
                    <option value="">Carregando contas...</option>
                </select>
            </div>
            <div>
                <label>De</label>
                <input type="date" id="filtroInicio">
            </div>
            <div>
                <label>Até</label>
                <input type="date" id="filtroFim">
            </div>
            <button class="btn-filtrar" onclick="carregarRazao()">
                <i class="fa-solid fa-filter"></i> Filtrar Razão
            </button>
        </div>

        <div id="gridRazao">
            <div class="empty-state">
                <i class="fa-solid fa-chart-column"></i>
                <p>Selecione uma conta para visualizar o Razão.</p>
            </div>
        </div>
    </main>

    <script src="/js/razao.js"></script>
</body>
</html>
