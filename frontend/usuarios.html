<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciar Usuários</title>
    <link rel="stylesheet" href="/css/usuarios.css">
    <link rel="stylesheet" href="/css/icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <!-- SIDEBAR CENTRALIZADA -->
    <div id="sidebar-container"></div>
    <script src="/js/sidebar.js"></script>

    <div class="main">
        <div class="top">
            <h1><i class="fa-solid fa-users-gear"></i> Gerenciar Usuários</h1>
        </div>

        <div class="usuarios-layout">
            <div class="usuarios-card">
                <h2><i class="fa-solid fa-user-plus" style="color:#ff7a00;margin-right:8px"></i>Cadastrar Novo Usuário</h2>
                <div class="usuarios-form">
                    <div>
                        <label>Login / Usuário</label>
                        <input id="newLogin" placeholder="Digite o login">
                    </div>
                    <div>
                        <label>Senha</label>
                        <input type="password" id="newSenha" placeholder="Digite a senha">
                    </div>
                    <button class="btn-primary" onclick="cadastrarUsuario()">Cadastrar Usuário</button>
                </div>
            </div>

            <div class="usuarios-card">
                <h2><i class="fa-solid fa-users" style="color:#ff7a00;margin-right:8px"></i>Usuários do Sistema</h2>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Login</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaUsuarios"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-box">
            <span id="modalIcon"></span>
            <p id="modalTexto"></p>
            <button onclick="fecharModal()">OK</button>
        </div>
    </div>

    <script src="/js/usuarios.js"></script>
</body>
</html>
