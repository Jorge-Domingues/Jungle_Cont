<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastros — Jungle Cont</title>
    <meta name="description" content="Cadastro de funcionários e plano de contas contábil">
    <link rel="stylesheet" href="/css/cadastros.css">
    <link rel="stylesheet" href="/css/icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div id="sidebar-container"></div>
    <script src="/js/sidebar.js"></script>

    <main class="main">
        <div class="top">
            <h1><i class="fa-solid fa-folder"></i> Cadastros</h1>
        </div>

        <!-- ABAS -->
        <div class="tabs">
            <button class="tab active" onclick="trocarAba('funcionario')">
                <i class="fa-solid fa-user"></i> Funcionários
            </button>
            <button class="tab" onclick="trocarAba('conta')">
                <i class="fa-solid fa-sitemap"></i> Plano de Contas
            </button>
        </div>

        <!-- FORM FUNCIONÁRIO -->
        <div class="form ativo" id="formFuncionario">
            <div class="form-card">
                <h2>Cadastrar Funcionário</h2>
                <div class="form-grid">
                    <div>
                        <label>NOME</label>
                        <input type="text" id="nome" placeholder="Nome completo">
                    </div>
                    <div>
                        <label>CPF</label>
                        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14">
                    </div>
                    <div>
                        <label>DATA DE INGRESSO</label>
                        <input type="date" id="data">
                    </div>
                    <div>
                        <label>CONTA BANCÁRIA</label>
                        <input type="text" id="conta" placeholder="Nº da conta">
                    </div>
                    <div>
                        <label>SALÁRIO</label>
                        <input type="text" id="salario" placeholder="R$ 0,00">
                    </div>
                </div>
                <button class="btn-primary" onclick="cadastrarFuncionario()">Cadastrar Funcionário</button>
            </div>
        </div>

        <!-- FORM CONTA CONTÁBIL -->
        <div class="form" id="formConta">
            <div class="form-card">
                <h2>Cadastrar Conta Contábil</h2>
                <div class="form-grid">
                    <div>
                        <label>CÓDIGO</label>
                        <input type="text" id="codigoConta" placeholder="Ex: 1.1.03">
                    </div>
                    <div>
                        <label>NOME DA CONTA</label>
                        <input type="text" id="nomeConta" placeholder="Nome descritivo">
                    </div>
                    <div>
                        <label>TIPO</label>
                        <select id="tipoConta" onchange="atualizarNatureza()">
                            <option value="">Selecione</option>
                            <option value="Ativo">Ativo</option>
                            <option value="Passivo">Passivo</option>
                            <option value="Patrimônio Líquido">Patrimônio Líquido</option>
                            <option value="Receita">Receita</option>
                            <option value="Despesa">Despesa</option>
                        </select>
                    </div>
                    <div>
                        <label>NATUREZA</label>
                        <select id="naturezaConta">
                            <option value="">Selecione o tipo primeiro</option>
                            <option value="Devedora">Devedora</option>
                            <option value="Credora">Credora</option>
                        </select>
                    </div>
                    <div>
                        <label>CONTA PAI</label>
                        <select id="contaPaiConta">
                            <option value="">Nenhuma (conta raiz)</option>
                        </select>
                    </div>
                    <div>
                        <label>CLASSIFICAÇÃO</label>
                        <select id="analiticaConta">
                            <option value="true">Analítica (recebe lançamentos)</option>
                            <option value="false">Sintética (totalizadora)</option>
                        </select>
                    </div>
                    <div>
                        <label>SALDO INICIAL</label>
                        <input type="text" id="saldoInicialConta" placeholder="R$ 0,00">
                    </div>
                    <div>
                        <label>DESCRIÇÃO</label>
                        <input type="text" id="descricaoConta" placeholder="Descrição da conta">
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn-primary" id="btnSalvarConta" onclick="cadastrarConta()">Cadastrar Conta</button>
                    <button class="btn-secondary" id="btnCancelarEdicaoConta" style="display:none;" onclick="cancelarEdicaoConta()">Cancelar</button>
                </div>
            </div>
        </div>

        <!-- LISTA -->
        <div class="list-card">
            <h2 id="tituloLista">Funcionários</h2>
            <table>
                <thead id="cabecalhoTabela"></thead>
                <tbody id="tabela"></tbody>
            </table>
        </div>

    </main>

    <!-- MODAL -->
    <div id="modal" class="modal">
        <div class="modal-box">
            <span id="modalIcon"></span>
            <p id="modalTexto"></p>
            <div class="modal-buttons">
                <button id="btnModalOk" onclick="fecharModal()">OK</button>
                <button id="btnModalCancelar" style="display:none;" class="btn-cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="/js/cadastros.js"></script>
</body>
</html>
