<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Balancete de Verificação — Jungle Cont</title>
    <meta name="description" content="Balancete de verificação com validação de equilíbrio contábil">
    <link rel="stylesheet" href="/css/balancete.css">
    <link rel="stylesheet" href="/css/icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div id="sidebar-container"></div>
    <script src="/js/sidebar.js"></script>

    <main class="main">
        <div class="top">
            <h1><i class="fa-solid fa-scale-balanced"></i> Balancete de Verificação <span id="dataRef"></span></h1>
            <p class="subtitle">Verificação do equilíbrio contábil — Σ Saldos Devedores = Σ Saldos Credores</p>
        </div>

        <div class="filtro-bar">
            <div>
                <label>De</label>
                <input type="date" id="filtroInicio">
            </div>
            <div>
                <label>Até</label>
                <input type="date" id="filtroFim">
            </div>
            <button class="btn-filtrar" onclick="carregarBalancete()">
                <i class="fa-solid fa-filter"></i> Filtrar
            </button>
        </div>

        <div class="balancete-layout">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Conta</th>
                            <th>Natureza</th>
                            <th>Débitos</th>
                            <th>Créditos</th>
                            <th>Saldo</th>
                        </tr>
                    </thead>
                    <tbody id="balanceteBody"></tbody>
                    <tfoot id="balanceteFoot"></tfoot>
                </table>
            </div>

            <div class="painel-lateral">
                <div class="card" id="cardResumo">
                    <h3>Resumo Patrimonial</h3>
                    <p>Carregando...</p>
                </div>
                <div class="card" id="cardEquacao">
                    <h3>Equação Fundamental</h3>
                    <p>Carregando...</p>
                </div>
                <div class="card" id="cardStatus">
                    <h3>Status</h3>
                    <p>Carregando...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/balancete.js"></script>
</body>
</html>
